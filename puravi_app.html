<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#06080a">
    <title>PURAVI APP</title>
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- MQTT Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root {
            --bg: #06080a;
            --primary: #00d2ff;
            --secondary: #7d5fff;
            --success: #00ff88;
            --danger: #ff3366;
            --warning: #ffb800;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        html, body {
            height: 100%;
            overflow: hidden; /* Prevent body bounce/scroll for native feel */
            overscroll-behavior: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 100px) 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .scroll-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* Animated Mesh Background */
        .mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 210, 255, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(125, 95, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(0, 255, 136, 0.05) 0px, transparent 50%);
            filter: blur(80px);
            animation: meshAnim 15s ease-in-out infinite alternate;
        }

        @keyframes meshAnim {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) rotate(3deg); }
        }

        .container {
            width: 100%;
            max-width: 440px;
            animation: fadeIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: left;
            margin-bottom: 30px;
            padding-left: 10px;
        }

        /* Branding & Header */
        .header {
            margin-bottom: 35px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, var(--primary), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
            letter-spacing: -2px;
            margin: 0;
            text-align: center;
            text-transform: uppercase;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.4));
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .header p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 7px;
            color: rgba(255, 255, 255, 0.4);
            margin: 15px 0 0;
            font-weight: 800;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #555;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        .status-dot.online {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Visual Stats Component */
        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* Legacy Aura Removed */

        /* Premium Circular Gauges */
        .gauge-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gauge-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255,255,255,0.05);
            stroke-width: 8;
        }

        .gauge-bar {
            fill: none;
            stroke: var(--primary);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.1, 0.7, 1.0, 0.1), stroke 0.4s ease;
        }

        .gauge-pulse {
            animation: pulse-ring 2s infinite ease-in-out;
        }

        @keyframes pulse-ring {
            0% { filter: drop-shadow(0 0 5px var(--primary)); opacity: 0.8; }
            50% { filter: drop-shadow(0 0 20px var(--primary)); opacity: 1; }
            100% { filter: drop-shadow(0 0 5px var(--primary)); opacity: 0.8; }
        }

        .gauge-val-group {
            position: absolute;
            text-align: center;
            z-index: 5;
        }

        .neon-safe { box-shadow: 0 0 20px rgba(0,255,136,0.15) !important; border-color: rgba(0,255,136,0.3) !important; }
        .neon-safe .v-display, .neon-safe .mini-val { color: var(--success) !important; text-shadow: 0 0 10px rgba(0,255,136,0.5); }

        .neon-warn { box-shadow: 0 0 30px rgba(255,165,0,0.2) !important; border-color: rgba(255,165,0,0.4) !important; }
        .neon-warn .v-display, .neon-warn .mini-val { color: var(--warning) !important; text-shadow: 0 0 15px rgba(255,165,0,0.6); }

        .neon-danger { box-shadow: 0 0 40px rgba(255,77,77,0.3) !important; border-color: rgba(255,77,77,0.5) !important; animation: glow-pulse 1.5s infinite; }
        .neon-danger .v-display, .neon-danger .mini-val { color: #ff4d4d !important; text-shadow: 0 0 20px rgba(255,77,77,0.7); }

        @keyframes glow-pulse {
            0% { box-shadow: 0 0 20px rgba(255,77,77,0.2) !important; }
            50% { box-shadow: 0 0 50px rgba(255,77,77,0.5) !important; }
            100% { box-shadow: 0 0 20px rgba(255,77,77,0.2) !important; }
        }

        .mini-val {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .mini-lbl {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.3;
            margin-top: 4px;
        }

        /* Controls Section */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            border: none;
            border-radius: 28px;
            padding: 24px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ff8822, #00ff8844);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: var(--success);
            box-shadow: 0 15px 35px rgba(0, 255, 136, 0.1);
        }

        .btn-start:active { transform: scale(0.95); background: var(--success); color: #000; }

        .btn-stop {
            background: linear-gradient(135deg, #ff336622, #ff336644);
            border: 1px solid rgba(255, 51, 102, 0.3);
            color: var(--danger);
            box-shadow: 0 15px 35px rgba(255, 51, 102, 0.1);
        }

        .btn-stop:active { transform: scale(0.95); background: var(--danger); color: #fff; }

        .btn-icon {
            font-size: 20px;
        }

        /* Navigation Bar */
        .nav-bar {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .nav-item {
            padding: 12px 25px;
            border-radius: 22px;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.3s;
        }

        .nav-item.active {
            background: rgba(255,255,255,0.05);
            color: var(--primary);
        }

        /* Settings Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 2000;
            transform: translateY(100%);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            padding: calc(var(--safe-top) + 20px) 20px;
            overflow-y: auto;
        }

        .overlay.active {
            transform: translateY(0);
        }

        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .close-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .param-group {
            background: var(--glass);
            border-radius: 25px;
            padding: 10px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
        }

        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .param-row:last-child { border-bottom: none; }

        .param-info { text-align: left; }
        .param-name { font-size: 13px; font-weight: 600; color: #fff; }
        .param-desc { font-size: 9px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 2px; }

        .param-ctrl {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .param-ctrl input {
            width: 70px;
            background: #000;
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 10px;
            color: var(--primary);
            text-align: center;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            outline: none;
        }

        .set-mini-btn {
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
        }

        .param-input.on { border-color: var(--success) !important; color: var(--success) !important; box-shadow: 0 0 15px rgba(0,255,136,0.1); }
        .param-input.off { border-color: var(--danger) !important; color: var(--danger) !important; box-shadow: 0 0 15px rgba(255,77,77,0.1); }
        
        select.param-input option { background: #111; color: #fff; }

        /* Tank Visualization */
        .tanks-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .tank {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tank-icon {
            width: 30px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            position: relative;
            overflow: hidden;
        }

        .water {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(transparent, var(--primary));
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tank.full .water { height: 90%; background: linear-gradient(transparent, var(--success)); }
        .tank.full .tank-icon { border-color: var(--success); }
        .tank.empty .water { height: 10%; background: linear-gradient(transparent, var(--danger)); }
        .tank.empty .tank-icon { border-color: var(--danger); }

        .fault-toast {
            position: fixed;
            top: calc(var(--safe-top) + 10px);
            left: 20px;
            right: 20px;
            background: var(--danger);
            color: #fff;
            padding: 15px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            z-index: 3000;
            transform: translateY(-150%);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255, 51, 102, 0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .fault-toast.active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="mesh"></div>
    
    <div id="toast" class="fault-toast">
        <span id="toast-msg">VOLTAGE ANOMALY DETECTED</span>
        <span onclick="toggleToast(false)" style="opacity:0.6">✕</span>
    </div>

    <!-- Scroll Container for Native Feel -->
    <div class="scroll-container">
        <div class="container" id="view-home">
            <div class="header">
                <h1>Puravi Powers</h1>
                <p>EMPOWERING YOUR FUTURE</p>
                <div style="margin-top:25px; display: flex; align-items: center; justify-content: center;">
                    <span id="dot" class="status-dot"></span> <span id="conn-lbl" style="font-size:11px; font-weight: 700; opacity:0.8; letter-spacing:1.5px; color: var(--primary);">ESTABLISHING LINK...</span>
                </div>
            </div>

            <div id="v-card" class="stat-card" style="padding:40px 20px;">
                <div class="gauge-container">
                    <svg class="gauge-svg" viewBox="0 0 100 100">
                        <circle class="gauge-bg" cx="50" cy="50" r="45"></circle>
                        <circle id="v-gauge" class="gauge-bar" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283"></circle>
                    </svg>
                    <div class="gauge-val-group">
                        <p id="v-val" style="font-size:54px; font-weight:800; margin:0;">0</p>
                        <p class="unit-lbl" style="margin:0;">VOLTS AC</p>
                    </div>
                </div>

                <div style="font-size:12px; font-weight:700; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:2px; margin-top:25px;" id="m-status">
                    MOTOR STANDBY
                </div>

                <div class="stats-grid">
                    <div class="gauge-container" style="width:120px; height:120px;" id="a-card">
                        <svg class="gauge-svg" viewBox="0 0 100 100">
                            <circle class="gauge-bg" cx="50" cy="50" r="45"></circle>
                            <circle id="a-gauge" class="gauge-bar" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283" style="stroke:var(--success)"></circle>
                        </svg>
                        <div class="gauge-val-group">
                            <p id="a-val" style="font-size:24px; font-weight:800; margin:0;">0.0</p>
                            <p style="font-size:8px; opacity:0.4; margin:0;">AMPS</p>
                        </div>
                    </div>
                    <div class="gauge-container" style="width:120px; height:120px;">
                        <svg class="gauge-svg" viewBox="0 0 100 100">
                            <circle class="gauge-bg" cx="50" cy="50" r="45"></circle>
                            <circle id="rt-gauge" class="gauge-bar" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="50" style="stroke:rgba(255,255,255,0.2)"></circle>
                        </svg>
                        <div class="gauge-val-group">
                            <p id="rt-val" style="font-size:20px; font-weight:800; margin:0;">00:00</p>
                            <p style="font-size:8px; opacity:0.4; margin:0;">DURATION</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tanks-row">
                <div id="tank-ut" class="tank">
                    <div class="tank-icon"><div class="water"></div></div>
                    <div style="text-align:left">
                        <div style="font-size:9px; opacity:0.4; font-weight:700;">UPPER TANK</div>
                        <div id="ut-lbl" style="font-size:11px; font-weight:800;">OK</div>
                    </div>
                </div>
                <div id="tank-lt" class="tank">
                    <div class="tank-icon"><div class="water"></div></div>
                    <div style="text-align:left">
                        <div style="font-size:9px; opacity:0.4; font-weight:700;">LOWER TANK</div>
                        <div id="lt-lbl" style="font-size:11px; font-weight:800;">OK</div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-start" onclick="sendCmd('G')">
                    <span class="btn-icon">⚡</span>
                    <span>START</span>
                </button>
                <button class="btn btn-stop" onclick="sendCmd('S')">
                    <span class="btn-icon">✕</span>
                    <span>STOP</span>
                </button>
            </div>
        </div>

        <!-- Settings Overlay -->
        <div id="overlay-set" class="overlay">
            <div class="overlay-header">
                <h2 style="margin:0; font-size:24px; font-weight:800;">System Config</h2>
                <div class="close-btn" onclick="toggleSettings(false)">✕</div>
            </div>
            
            <div id="param-list">
                <!-- Parameters will be injected here -->
            </div>
            
            <div class="param-group" style="margin-top:30px; border-color:var(--primary); background:rgba(0,210,255,0.05);">
                <div class="param-name" style="color:var(--primary); font-size:16px;">☁️ CLOUD SETTINGS</div>
                <div class="param-desc" style="margin-bottom:12px;">Google Sheets Webhook URL</div>
                <input type="text" id="webhook-input" placeholder="Paste script URL here..." class="param-input" style="width:100% !important; text-align:left; font-size:12px; margin-bottom:10px;">
                <button class="set-mini-btn" style="width:100%; height:45px;" onclick="saveWebhook()">SAVE WEBHOOK</button>
            </div>

            <div class="param-group" style="margin-top:20px;">
                <div class="param-name">⚡ CUMULATIVE ENERGY</div>
                <div class="param-row" style="align-items:center;">
                    <div id="kwh-disp" style="font-size:32px; font-weight:800; color:var(--success);">0.0000 <span style="font-size:14px; opacity:0.6;">kWh</span></div>
                    <button class="set-mini-btn" style="background:rgba(255,0,0,0.1); color:#ff4d4d; border-color:rgba(255,0,0,0.2); margin-left:auto;" onclick="resetEnergy()">RESET</button>
                </div>
            </div>
            
            <div style="height:100px;"></div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="toggleSettings(false)">
            <span style="font-size:18px;">🏠</span>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="toggleSettings(true)">
            <span style="font-size:18px;">⚙️</span>
            <span>Settings</span>
        </div>
    </div>

    <script>
        const APP_VERSION = "2.2.2";

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => {
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        };
                    };
                });
        }

        const BROKER = "cadeb3d01f724103a90d8399337dfd15.s1.eu.hivemq.cloud";
        const PORT = 8884;
        const USER = "PuraviPowers";
        const PASS = "Puravipowers@1231";
        
        let client;
        let cumulativeKWh = 0;
        let lastTimestamp = Date.now();
        let lastLogTime = 0;

        function connect() {
            const clientId = "p_u_" + Math.random().toString(16).substr(2, 4);
            client = new Paho.MQTT.Client(BROKER, PORT, clientId);
            client.onConnectionLost = (rsp) => {
                let reason = rsp.errorMessage || "Network Error";
                updateStatus(false, "LINK SEVERED: " + reason);
                setTimeout(connect, 5000);
            };
            client.onMessageArrived = (msg) => handleData(msg.payloadString);
            client.connect({
                useSSL: true, userName: USER, password: PASS,
                timeout: 10,
                onSuccess: () => {
                    updateStatus(true, "CONNECTED TO CLOUD");
                    client.subscribe("puravi/telemetry");
                    sendCmd('Q');
                },
                onFailure: (err) => {
                    let msg = err.errorMessage || "Unknown Error";
                    if (msg.includes("AMQJSC0001E")) msg = "WRONG PASSWORD/USER";
                    updateStatus(false, "CLOUD FAILED: " + msg);
                    setTimeout(connect, 10000);
                }
            });
        }

        function updateStatus(online, msg) {
            document.getElementById('dot').className = online ? 'status-dot online' : 'status-dot';
            document.getElementById('conn-lbl').innerText = msg;
        }

        const PARAMS = [
            { name: "Operation Mode", type: "select", options: ["Manual", "Auto"], max: 1 },
            { name: "Pump ON Time", type: "time", max: 1440 },
            { name: "Pump OFF Time", type: "time", max: 1440 },
            { name: "Dryrun Retry Time", type: "time", max: 1440 },
            { name: "Upper Tank Float", type: "select", options: ["Disable", "Enable"], max: 1 },
            { name: "Lower Tank Float", type: "select", options: ["Disable", "Enable"], max: 1 },
            { name: "Power up Auto Start", type: "select", options: ["Disable", "Enable"], max: 1 },
            { name: "Buzzer Indication", type: "select", options: ["Disable", "Enable"], max: 1 },
            { name: "Dual Tank Mode", type: "select", options: ["Single", "Dual"], max: 1 },
            { name: "Overload Current", type: "number", unit: "A", step: 0.1, max: 800 },
            { name: "Dryrun Current", type: "number", unit: "A", step: 0.1, max: 800 },
            { name: "Low Voltage Setting", type: "number", unit: "V", max: 500 },
            { name: "High Voltage Setting", type: "number", unit: "V", max: 500 }
        ];

        function initParams() {
            let html = "";
            PARAMS.forEach((p, i) => {
                const id = i + 1;
                let inputHtml = "";
                if (p.type === "select") {
                    inputHtml = `<select id="p-${id}" class="param-input" onchange="updateColors(this)">`;
                    p.options.forEach((opt, idx) => { inputHtml += `<option value="${idx}">${opt}</option>`; });
                    inputHtml += `</select>`;
                } else if (p.type === "time") {
                    inputHtml = `<input type="time" id="p-${id}" class="param-input">`;
                } else {
                    inputHtml = `<input type="number" id="p-${id}" step="${p.step||1}" class="param-input">`;
                }

                html += `
                <div class="param-group" id="group-${id}">
                    <div class="param-row">
                        <div class="param-info">
                            <div class="param-name">${p.name}</div>
                            <div class="param-desc">Menu Item ${id}</div>
                        </div>
                        <div class="param-ctrl">
                            ${inputHtml}
                            <button class="set-mini-btn" onclick="saveParam(${id})">SET</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('param-list').innerHTML = html;
            // Apply initial colors
            setTimeout(() => {
                document.querySelectorAll('select.param-input').forEach(updateColors);
            }, 100);
        }

        function mcuToTime(val) {
            let hh = Math.floor(val / 60);
            let mm = val % 60;
            return `${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`;
        }

        function timeToMcu(str) {
            let [h, m] = str.split(':');
            return parseInt(h) * 60 + parseInt(m);
        }

        function updateColors(el) {
            if (el.tagName === 'SELECT') {
                el.className = 'param-input ' + (el.value == '1' ? 'on' : 'off');
            }
        }

        function handleData(raw) {
            // Bulk Sync Handler: $S,v1,v2,v3,v4,v5,v6,v7,v8,v9,v10,v11,v12,v13*
            if (raw.startsWith('$S')) {
                let match = raw.match(/\$S,([0-9,.-]+)\*/);
                if (!match) return;
                let values = match[1].split(',').map(Number);
                values.forEach((v, i) => {
                    const id = i + 1;
                    if (id > PARAMS.length) return;
                    let el = document.getElementById('p-' + id);
                    if (el && document.activeElement !== el) {
                        if (PARAMS[i].type === "time") el.value = mcuToTime(v);
                        else if (id == 10 || id == 11) el.value = (v / 10).toFixed(1);
                        else el.value = v;
                        updateColors(el);
                    }
                });
                return;
            }

            // Single Pulse Handler: !W:ID:VAL or P1:1 Pulse
            if (raw.includes('P') || raw.includes('!') || raw.includes('W')) {
                let match = raw.match(/[!PW].*?(\d+):(-?\d+\.?\d*)/);
                if (!match) return;
                let id = parseInt(match[1]);
                let val = parseFloat(match[2]);

                if (id < 1 || id > PARAMS.length) return;
                let el = document.getElementById('p-' + id);
                if (el && document.activeElement !== el) {
                    if (PARAMS[id-1].type === "time") el.value = mcuToTime(val);
                    else if (id == 10 || id == 11) el.value = (val / 10).toFixed(1);
                    else el.value = val;
                    updateColors(el);
                }
                
                let group = document.getElementById('group-' + id);
                if (group) {
                    group.style.borderColor = "var(--success)";
                    setTimeout(() => group.style.borderColor = "var(--glass-border)", 800);
                }
                return;
            }

            // Telemetry Parsing ($V,A,S,RT,F,ST*)
            let tMatch = raw.match(/\$([0-9,.-]+)\*/);
            if (!tMatch) return;
            let data = tMatch[1].split(',').map(Number);
            // STM8 sends 5 fields: $Volts,Amps,State,RunSec,Fault*
            if (data.length < 5) return;

            const [v, a, s, rt, f] = data;
            // Derive status text from numeric fields
            const statusTxt = f > 0 ? ['','HV TRIP','LV TRIP','OC TRIP','DRY RUN','UPPER FULL','LOWER EMPTY'][f] || 'FAULT'
                            : s === 1 ? 'RUNNING' : s === 2 ? 'STARTING' : 'STANDBY';
            if (isNaN(v) || v > 550) return; 

            document.getElementById('v-val').innerText = v;
            document.getElementById('a-val').innerText = (a / 10).toFixed(1);
            
            // Gauge Logic
            const vOffset = 283 - (Math.min(v, 300) / 300) * 283;
            document.getElementById('v-gauge').style.strokeDashoffset = vOffset;
            const aOffset = 283 - (Math.min(a / 10, 50) / 50) * 283;
            document.getElementById('a-gauge').style.strokeDashoffset = aOffset;

            // Status & Pulsing Logic
            let vGauge = document.getElementById('v-gauge');
            let aGauge = document.getElementById('a-gauge');
            if (s === 1) {
                vGauge.classList.add('gauge-pulse');
                aGauge.classList.add('gauge-pulse');
            } else {
                vGauge.classList.remove('gauge-pulse');
                aGauge.classList.remove('gauge-pulse');
            }

            // Neon Colors
            if (v < 170 || v > 260) vGauge.style.stroke = "#ff4d4d";
            else if (v < 190 || v > 240) vGauge.style.stroke = "orange";
            else vGauge.style.stroke = "var(--primary)";

            if ((a/10) > 20) aGauge.style.stroke = "#ff4d4d";
            else aGauge.style.stroke = "var(--success)";

            let now = Date.now();
            let deltaHours = (now - lastTimestamp) / (1000 * 3600);
            if (s === 1) cumulativeKWh += (v * (a / 10) * deltaHours) / 1000;
            lastTimestamp = now;

            // FIX: Robust Time Duration Format (Seconds to H:MM)
            const safeRt = isNaN(rt) || rt > 864000 ? 0 : rt; // Cap at 10 days
            let hours = Math.floor(safeRt / 3600);
            let mins = Math.floor((safeRt % 3600) / 60);
            document.getElementById('rt-val').innerText = `${hours}:${mins.toString().padStart(2, '0')}`;
            document.getElementById('rt-gauge').style.strokeDashoffset = 283 - (Math.min(mins, 60) / 60) * 283;
            
            const states = ["MOTOR STANDBY", "MOTOR RUNNING", "POWER DELAY", "DRY RETRY"];
            document.getElementById('m-status').innerText = states[s] || "SYSTEM ACTIVE";
            document.getElementById('m-status').style.color = s == 1 ? "var(--success)" : (s > 1 ? "var(--warning)" : "rgba(255,255,255,0.4)");

            const isFull = (f === 5); const isEmpty = (f === 6);
            document.getElementById('tank-ut').className = isFull ? 'tank full' : 'tank';
            document.getElementById('ut-lbl').innerText = isFull ? 'FULL' : 'OK';
            document.getElementById('tank-lt').className = isEmpty ? 'tank empty' : 'tank';
            document.getElementById('lt-lbl').innerText = isEmpty ? 'EMPTY' : 'OK';

            if (f > 0) {
                const faults = ["", "HIGH VOLTAGE", "LOW VOLTAGE", "OVERLOAD TRIP", "DRY RUN TRIP", "SENSOR FAULT", "FLOAT ERROR"];
                document.getElementById('toast-msg').innerText = faults[f] || "HARDWARE FAULT";
                toggleToast(true);
            } else { toggleToast(false); }

            // Update kWh display
            document.getElementById('kwh-disp').innerHTML = `${cumulativeKWh.toFixed(4)} <span style="font-size:14px; opacity:0.6;">kWh</span>`;
            localStorage.setItem('puravi_kwh', cumulativeKWh);

            if (now - lastLogTime > 300000) {
                logToCloud(v, a/10, cumulativeKWh);
                lastLogTime = now;
            }
        }

        function logToCloud(v, a, kwh) {
            const WEBHOOK_URL = localStorage.getItem('webhook_url');
            if (!WEBHOOK_URL) return;
            const states = ["Standby", "Running", "Power Delay", "Dry Retry"];
            const currentStatus = states[document.getElementById('m-status').innerText.includes('RUNNING') ? 1 : 0]; // Simplified
            const data = { 
                time: new Date().toLocaleString(), 
                volts: v, 
                amps: a, 
                energy: kwh.toFixed(4),
                power: (v * a).toFixed(1),
                status: document.getElementById('m-status').innerText 
            };
            fetch(WEBHOOK_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }).catch(() => {});
        }

        function sendCmd(c) {
            if (!client || !client.isConnected()) {
                updateStatus(false, "OFFLINE: DISPATCH FAILED");
                return;
            }
            // Add '$' prefix for STM8 protocol
            let msg = new Paho.MQTT.Message('$' + c);
            msg.destinationName = "puravi/command";
            msg.retained = false; // CRITICAL: Prevent HiveMQ from replaying on reconnect!
            msg.qos = 0;         // Fire-and-forget — no re-delivery of stale commands
            
            // Single precise send — STM8 'G' command sets state directly (NOT a toggle)
            // Sending multiple times causes rapid timer resets and motor flicker
            client.send(msg);
            
            // Visual feedback for commands
            document.getElementById('toast-msg').innerText = "DISPATCHING: " + (c=='G'?'START':(c=='S'?'STOP':'SYNC'));
            toggleToast(true);
            setTimeout(() => toggleToast(false), 2000);
        }

        function saveParam(id) {
            let el = document.getElementById('p-' + id);
            let val = el.value;
            
            // Validation: Use strict check — val=0 (Disable) must NOT be rejected!
            if (val.toString().trim() === "" || (PARAMS[id-1].type === "time" && val === undefined)) {
                alert("Please select a valid value!");
                return;
            }

            if (PARAMS[id-1].type === "time") val = timeToMcu(val);
            else if (id == 10 || id == 11) val = Math.round(val * 10);
            
            // Format: W <2-digit ID> <4-digit Value>
            let cmd = "W" + id.toString().padStart(2, '0') + val.toString().padStart(4, '0');
            sendCmd(cmd);
            
            // Feedback
            let btn = el.nextElementSibling;
            if(btn) {
                btn.innerText = "DONE";
                setTimeout(() => btn.innerText = "SET", 1000);
            }
        }

        function toggleSettings(show) {
            document.getElementById('overlay-set').className = show ? 'overlay active' : 'overlay';
            document.querySelectorAll('.nav-item')[0].className = show ? 'nav-item' : 'nav-item active';
            document.querySelectorAll('.nav-item')[1].className = show ? 'nav-item active' : 'nav-item';
            if (show) sendCmd('Q'); // Send QUERY (NOT Stop!) to sync settings from STM8
        }

        function toggleToast(show) {
            document.getElementById('toast').className = show ? 'fault-toast active' : 'fault-toast';
        }

        function saveWebhook() {
            const url = document.getElementById('webhook-input').value;
            if (url.startsWith('https://script.google.com')) {
                localStorage.setItem('webhook_url', url);
                alert("Cloud Webhook Saved! Data will sync every 5 mins.");
            } else {
                alert("Invalid URL! Please paste the Google Web App URL.");
            }
        }

        function resetEnergy() {
            if (confirm("Reset cumulative kWh to 0?")) {
                cumulativeKWh = 0;
                localStorage.setItem('puravi_kwh', 0);
                document.getElementById('kwh-disp').innerHTML = '0.0000 <span style="font-size:14px; opacity:0.6;">kWh</span>';
            }
        }

        window.onload = () => {
            const DEFAULT_WEBHOOK = "https://script.google.com/macros/s/AKfycbx2rv5TvEPChUa5fsEk1vMLk_jGu5rhy0RFMU7ZA4tZdGMm5acWhDe5DgWaWnx4xljC/exec";
            
            // Automatic version refresh logic
            if (localStorage.getItem('app_v') !== APP_VERSION) {
                localStorage.setItem('app_v', APP_VERSION);
                Promise.all([
                    caches.delete('puravi-v1'), 
                    caches.delete('puravi-v2'),
                    caches.delete('puravi-v3'),
                    caches.delete('puravi-v4'),
                    caches.delete('puravi-v5'),
                    caches.delete('puravi-v6')
                ]).then(() => window.location.reload(true));
            }
            // Load saved state
            cumulativeKWh = parseFloat(localStorage.getItem('puravi_kwh') || 0);
            
            let savedUrl = localStorage.getItem('webhook_url');
            if (!savedUrl || savedUrl === "") {
                localStorage.setItem('webhook_url', DEFAULT_WEBHOOK);
                savedUrl = DEFAULT_WEBHOOK;
            }
            document.getElementById('webhook-input').value = savedUrl;
            
            initParams(); 
            connect(); 
        };
    </script>
</body>
